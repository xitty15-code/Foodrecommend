<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园美食推荐</title>
    <link rel="stylesheet" href="./assets/css/common.css">
    <style>
        .login-container { max-width: 450px; margin: 80px auto; padding: 40px; background: white; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .login-title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 22px; color: #333; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 16px; }
        .login-btn { width: 100%; padding: 14px; background: #FF8C42; color: white; border: 0; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .register-link, .back-home { text-align: center; margin-top: 24px; color: #666; }
        .register-link a, .back-home a { color: #FF8C42; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">校园美食推荐</div>
        <div class="login-title" style="font-size: 24px; margin-top: -12px;">登录</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登录</button>
        </form>

        <div class="register-link">还没有账号？<a href="register.html">立即注册</a></div>
        <div class="back-home"><a href="index.html">返回首页</a></div>
    </div>

    <footer class="footer"><div class="container"><p>© 2026 校园美食推荐系统</p></div></footer>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/utils.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                showMessage('请填写完整信息', 'error');
                return;
            }
            const result = await login(username, password);
            if (result.success) {
                showMessage('登录成功');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } else {
                showMessage(result.msg || '登录失败', 'error');
            }
        });

        if (getCurrentUser()) window.location.href = 'index.html';
    </script>
</body>
</html>
