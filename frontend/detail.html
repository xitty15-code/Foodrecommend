<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品详情 - 校园美食推荐</title>
    <link rel="stylesheet" href="./assets/css/common.css">
    <style>
        .detail-wrap { display: flex; gap: 30px; margin-top: 40px; background: #fff; padding: 24px; border-radius: 16px; }
        .detail-img { width: 400px; height: 300px; border-radius: 12px; object-fit: cover; }
        .detail-main { flex: 1; }
        .comment-area { margin-top: 40px; background: #fff; padding: 24px; border-radius: 16px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin: 15px 0; resize: vertical; }
        .comment-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .detail-actions { display: flex; gap: 12px; margin-top: 18px; }
        @media (max-width: 768px) {
            .detail-wrap { flex-direction: column; }
            .detail-img { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">校园美食推荐</a>
            <div class="nav-menu"><a href="index.html">返回首页</a></div>
            <div class="nav-right"></div>
        </div>
    </nav>

    <div class="container">
        <div id="detailInfo" class="detail-wrap"><div class="loading">加载中...</div></div>

        <div class="comment-area">
            <h3>发表评论</h3>
            <textarea id="commentText" placeholder="说说你的用餐体验..."></textarea>
            <button class="btn-primary" onclick="submitComment()">提交评论</button>

            <h3 style="margin:30px 0 15px">用户评价</h3>
            <div id="commentList"></div>
        </div>
    </div>

    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/utils.js"></script>
    <script>
        const foodId = new URLSearchParams(location.search).get('id');
        let userInfo = getCurrentUser();
        let currentFood = null;

        async function renderComment() {
            const list = await getComments(foodId);
            const html = list.map(item => `
                <div class="comment-item">
                    <strong>${item.username || '匿名用户'}</strong>
                    <span style="color:#999; margin-left:8px;">${item.created_at || ''}</span>
                    <p style="margin-top:5px">${item.content || ''}</p>
                </div>
            `).join('');
            document.getElementById('commentList').innerHTML = html || '<div class="empty-state">暂无评论</div>';
        }

        async function renderFavoriteButton() {
            userInfo = getCurrentUser();
            const holder = document.getElementById('favoriteHolder');
            if (!holder || !userInfo || !userInfo.id) {
                if (holder) holder.innerHTML = '';
                return;
            }
            const result = await checkFavorite(userInfo.id, foodId);
            const active = result.success && result.is_favorited;
            holder.innerHTML = `<button class="btn-outline" onclick="toggleFavorite(${active})">${active ? '取消收藏' : '收藏'}</button>`;
        }

        async function toggleFavorite(isFavorited) {
            userInfo = getCurrentUser();
            if (!userInfo || !userInfo.id) {
                showMessage('请先登录', 'error');
                return;
            }
            const result = isFavorited
                ? await removeFavorite(userInfo.id, foodId)
                : await addFavorite(userInfo.id, foodId);
            showMessage(result.msg || (result.success ? '操作成功' : '操作失败'), result.success ? 'success' : 'error');
            if (result.success) renderFavoriteButton();
        }

        async function loadDetail() {
            if (!foodId) {
                showMessage('参数错误', 'error');
                setTimeout(() => { location.href = 'index.html'; }, 800);
                return;
            }

            currentFood = await getFood(foodId);
            if (!currentFood) {
                showMessage('菜品不存在', 'error');
                setTimeout(() => { location.href = 'index.html'; }, 800);
                return;
            }

            const displayName = getDisplayFoodName(currentFood);
            const imageUrl = normalizeImageUrl(currentFood.image_url, getFoodFallbackImage(currentFood));
            var priceText = formatPrice(currentFood.price);
            var ratingText = getFoodRatingText(currentFood);
            var reviewText = currentFood.review || getMissingReviewText(currentFood) || '暂无介绍';
            var sourceLink = currentFood.source_url
                ? '<a class="btn-outline" href="' + currentFood.source_url + '" target="_blank" rel="noopener noreferrer">查看来源</a>'
                : '';
            document.getElementById('detailInfo').innerHTML = `
                <img class="detail-img" src="${imageUrl}" alt="${displayName}" onerror="this.src='${getFoodFallbackImage(currentFood)}'">
                <div class="detail-main">
                    <h1>${displayName}</h1>
                    ${priceText ? `<p style="margin:10px 0;font-size:16px">售价：${priceText}</p>` : ''}
                    <p style="margin:10px 0;font-size:16px">综合评分：${ratingText}</p>
                    <p style="margin:10px 0;font-size:16px">所属分类：${currentFood.category || '暂无'}</p>
                    <p style="margin:10px 0;font-size:16px">口味特点：${currentFood.original_taste || '暂无'}</p>
                    <p style="margin-top:15px;line-height:1.7">菜品简介：${reviewText}</p>
                    <div class="detail-actions" id="favoriteHolder"></div>
                    ${sourceLink ? `<div style="margin-top:12px">${sourceLink}</div>` : ''}
                </div>
            `;

            if (userInfo && userInfo.id) await addHistory(userInfo.id, foodId);
            await renderFavoriteButton();
            await renderComment();
        }

        window.submitComment = async function() {
            userInfo = getCurrentUser();
            if (!userInfo || !userInfo.username) {
                showMessage('请先登录账号', 'error');
                return;
            }

            const content = document.getElementById('commentText').value.trim();
            if (!content) {
                showMessage('请输入评论内容', 'error');
                return;
            }

            const result = await postComment({ food_id: foodId, user_id: userInfo.id, content });
            if (result.success) {
                document.getElementById('commentText').value = '';
                showMessage('评论发布成功');
                await renderComment();
            } else {
                showMessage(result.msg || '评论发布失败', 'error');
            }
        };

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>
</html>
